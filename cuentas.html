<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Cuentas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm">
                <div class="card-header text-center">
                    <h4>Mis Cuentas Bancarias</h4>
                    <p class="mb-0 text-muted">Aquí puedes ver todas las cuentas creadas en el sistema.</p>
                </div>
                <div class="card-body">
                    <div id="mensaje" class="mb-3"></div>
                    <div class="table-responsive">
                        <table id="cuentasTabla" class="table table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>Número de Cuenta</th>
                                    <th>Tipo</th>
                                    <th>Saldo</th>
                                    <th>Fecha de Creación</th>
                                </tr>
                            </thead>
                            <tbody id="cuentasBody"></tbody>
                        </table>
                    </div>
                    <div class="text-end mt-3">
                        <a href="account.html" class="btn btn-secondary">Crear nueva cuenta</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="cuentas.js"></script>
</body>
</html>
