<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mis Cuentas — Banco Lupita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --azul-banco: #0d47a1; --azul-claro: #1565c0; }
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }

        .navbar-banco {
            background: linear-gradient(135deg, var(--azul-banco), var(--azul-claro));
            padding: 14px 24px;
        }
        .navbar-banco .brand { font-size: 1.3rem; font-weight: 700; color: #fff; }
        .navbar-banco .info  { color: rgba(255,255,255,.85); font-size: .9rem; }
        .btn-nav {
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.4);
            color: #fff; font-size: .85rem;
            border-radius: 20px; padding: 4px 14px;
            text-decoration: none;
        }
        .btn-nav:hover { background: rgba(255,255,255,.3); color: #fff; }

        /* Tarjetas */
        .cuenta-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            transition: transform .15s, box-shadow .15s, outline .1s;
            overflow: hidden;
            cursor: pointer;
        }
        .cuenta-card:hover { transform: translateY(-4px); box-shadow: 0 8px 22px rgba(0,0,0,.14); }

        /* Resaltado de cuenta activa */
        .cuenta-card.es-activa { outline: 3px solid #ffd600; outline-offset: 2px; }
        .badge-activa {
            background: #ffd600; color: #333;
            font-size: .7rem; font-weight: 700;
            border-radius: 20px; padding: 2px 10px;
            vertical-align: middle; margin-left: 6px;
        }

        .cuenta-header-ahorro    { background: linear-gradient(135deg, #2e7d32, #43a047); }
        .cuenta-header-corriente { background: linear-gradient(135deg, #0d47a1, #1976d2); }
        .cuenta-header { color: #fff; padding: 20px 22px 14px; }
        .cuenta-header .tipo-label { font-size: .78rem; opacity: .8; letter-spacing: 1px; text-transform: uppercase; }
        .cuenta-header .num-cuenta { font-size: .9rem; opacity: .8; letter-spacing: 2px; margin-bottom: 4px; }
        .cuenta-header .saldo-val  { font-size: 2rem; font-weight: 700; }
        .cuenta-header .hint       { font-size: .75rem; opacity: .65; margin-top: 4px; }

        .cuenta-body { padding: 14px 22px; }
        .cuenta-body .fecha { font-size: .8rem; color: #888; }

        .badge-ahorro    { background: #e8f5e9; color: #2e7d32; border-radius: 20px; padding: 3px 12px; font-size: .78rem; }
        .badge-corriente { background: #e3f2fd; color: #0d47a1; border-radius: 20px; padding: 3px 12px; font-size: .78rem; }

        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 12px; }
    </style>
</head>
<body>

<nav class="navbar-banco d-flex align-items-center justify-content-between mb-4">
    <div>
        <div class="brand">🏦 Banco Lupita</div>
        <div class="info" id="nav-usuario">Cargando...</div>
    </div>
    <div class="d-flex gap-2">
        <a href="account.html" class="btn-nav"><i class="bi bi-plus-circle me-1"></i>Nueva cuenta</a>
        <a href="dashboard.html" class="btn-nav"><i class="bi bi-grid me-1"></i>Dashboard</a>
        <button class="btn-nav" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
    </div>
</nav>

<div class="container pb-5">

    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h5 class="fw-bold mb-0"><i class="bi bi-wallet2 me-2 text-primary"></i>Mis Cuentas</h5>
            <small class="text-muted">Haz clic en una tarjeta para operar con esa cuenta en el Dashboard</small>
        </div>
        <a href="account.html" class="btn btn-primary btn-sm">
            <i class="bi bi-plus me-1"></i>Nueva cuenta
        </a>
    </div>

    <div id="mensaje"></div>
    <div class="row g-3" id="cuentasGrid">
        <div class="col-12 text-center py-5">
            <span class="spinner-border text-primary"></span>
            <p class="mt-3 text-muted">Cargando cuentas…</p>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Sesión ──────────────────────────────────────────────
const sesion = {
    usuarioId: localStorage.getItem('usuarioId'),
    nombre:    localStorage.getItem('nombre'),
    cuentaId:  parseInt(localStorage.getItem('cuentaId') || '0')
};
if (!sesion.usuarioId) window.location.href = 'frontend_login/login.html';
document.getElementById('nav-usuario').textContent = `Hola, ${sesion.nombre}`;

function cerrarSesion() { localStorage.clear(); window.location.href = 'frontend_login/login.html'; }

// ── Helpers ─────────────────────────────────────────────
function formatMoney(v) {
    return '$' + parseFloat(v).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function formatFecha(f) {
    return new Date(f).toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ── Seleccionar cuenta y volver al dashboard ────────────
function seleccionarCuenta(cuentaId, numeroCuenta, saldo) {
    localStorage.setItem('cuentaId',     cuentaId);
    localStorage.setItem('numeroCuenta', numeroCuenta);
    localStorage.setItem('saldo',        saldo);
    window.location.href = 'dashboard.html';
}

// ── Cargar cuentas ───────────────────────────────────────
async function cargarCuentas() {
    const grid = document.getElementById('cuentasGrid');

    try {
        const res  = await fetch(`cuentas.php?usuarioId=${sesion.usuarioId}`);
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Error al cargar');

        if (!data.cuentas || data.cuentas.length === 0) {
            grid.innerHTML = `
                <div class="col-12">
                    <div class="empty-state">
                        <i class="bi bi-wallet2"></i>
                        <p class="fw-semibold mb-1">Aún no tienes cuentas</p>
                        <p class="small text-muted mb-3">Crea tu primera cuenta bancaria para comenzar.</p>
                        <a href="account.html" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-1"></i>Crear mi primera cuenta
                        </a>
                    </div>
                </div>`;
            return;
        }

        grid.innerHTML = data.cuentas.map(c => {
            const esActiva = c.id == sesion.cuentaId;
            return `
            <div class="col-md-6 col-lg-4">
                <div class="cuenta-card ${esActiva ? 'es-activa' : ''}"
                     onclick="seleccionarCuenta(${c.id}, '${c.numero_cuenta}', ${c.saldo})"
                     title="Clic para operar con esta cuenta">

                    <div class="cuenta-header cuenta-header-${c.tipo}">
                        <div class="tipo-label">
                            ${c.tipo === 'ahorro' ? '💰 Cuenta de Ahorro' : '💳 Cuenta Corriente'}
                            ${esActiva ? '<span class="badge-activa ms-1">ACTIVA EN DASHBOARD</span>' : ''}
                        </div>
                        <div class="num-cuenta">Nº ${c.numero_cuenta}</div>
                        <div class="saldo-val">${formatMoney(c.saldo)}</div>
                        <div class="hint"><i class="bi bi-arrow-right-circle me-1"></i>Haz clic para operar con esta cuenta</div>
                    </div>

                    <div class="cuenta-body d-flex align-items-center justify-content-between">
                        <div>
                            <span class="badge-${c.tipo}">${c.tipo.charAt(0).toUpperCase()+c.tipo.slice(1)}</span>
                            <div class="fecha mt-2"><i class="bi bi-calendar3 me-1"></i>Apertura: ${formatFecha(c.fecha_apertura)}</div>
                        </div>
                        <div class="text-success fw-semibold small">
                            <i class="bi bi-check-circle me-1"></i>Activa
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');

    } catch (err) {
        grid.innerHTML = `
            <div class="col-12">
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle me-1"></i>${err.message}
                </div>
            </div>`;
    }
}

cargarCuentas();
</script>
</body>
</html>
