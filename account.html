<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header text-center">
                    <h4 id="tituloHeader">Crear Cuenta Bancaria</h4>
                </div>

                <div class="card-body">
                    <div id="formularioSeccion">
                        <form id="cuentaForm">

                            <!-- Tipo de cuenta -->
                            <div class="mb-3">
                                <label class="form-label">Tipo de cuenta</label>
                                <select id="tipo" class="form-select" required>
                                    <option value="">Selecciona...</option>
                                    <option value="ahorro">Ahorro</option>
                                    <option value="corriente">Corriente</option>
                                </select>
                            </div>

                            <!-- Saldo inicial -->
                            <div class="mb-3">
                                <label class="form-label">Saldo inicial</label>
                                <input type="number" id="saldo" class="form-control" min="0" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Crear Cuenta
                            </button>
                        </form>

                        <div id="tipoDescripcion" class="alert alert-info mt-3 d-none"></div>

                        <div id="mensaje" class="mt-3"></div>
                    </div>

                    <div id="resumenSeccion" class="d-none">
                        <div class="text-center mb-4">
                            <h5 class="text-success">¡Cuenta Creada Exitosamente!</h5>
                            <p class="text-muted">Aquí tienes el resumen de tu nueva cuenta</p>
                        </div>

                        <div class="row">
                            <div class="col-sm-6">
                                <strong>Número de Cuenta:</strong>
                                <p id="numeroCuenta" class="text-primary fs-5"></p>
                            </div>
                            <div class="col-sm-6">
                                <strong>Tipo de Cuenta:</strong>
                                <p id="tipoCuenta"></p>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-sm-6">
                                <strong>Saldo Inicial:</strong>
                                <p id="saldoInicial"></p>
                            </div>
                            <div class="col-sm-6">
                                <strong>Estado:</strong>
                                <p class="text-success">Activa</p>
                            </div>
                        </div>

                        <hr>

                        <h6>Acciones Disponibles</h6>
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-primary" onclick="alert('Funcionalidad de depósito próximamente')">Depositar Dinero</button>
                            <button class="btn btn-outline-primary" onclick="alert('Funcionalidad de retiro próximamente')">Retirar Dinero</button>
                            <a href="cuentas.html" class="btn btn-primary">Ver mis cuentas</a>
                            <button class="btn btn-outline-secondary" onclick="location.reload()">Crear Otra Cuenta</button>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="account.js"></script>

</body>
</html>
