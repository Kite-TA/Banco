<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear Cuenta — Banco Lupita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --azul-banco: #0d47a1; --azul-claro: #1565c0; }
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }

        .navbar-banco {
            background: linear-gradient(135deg, var(--azul-banco), var(--azul-claro));
            padding: 14px 24px;
        }
        .navbar-banco .brand  { font-size: 1.3rem; font-weight: 700; color: #fff; }
        .navbar-banco .info   { color: rgba(255,255,255,.85); font-size: .9rem; }
        .btn-nav {
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.4);
            color: #fff; font-size: .85rem;
            border-radius: 20px; padding: 4px 14px;
            text-decoration: none;
        }
        .btn-nav:hover { background: rgba(255,255,255,.3); color: #fff; }

        .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.09); }
        .card-header { background: #fff; border-bottom: 1px solid #eee; border-radius: 14px 14px 0 0 !important; }

        .badge-ahorro    { background: #e8f5e9; color: #2e7d32; }
        .badge-corriente { background: #e3f2fd; color: #0d47a1; }
        .badge-tipo { font-size: .8rem; padding: 5px 12px; border-radius: 20px; }

        .resumen-box {
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            color: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        .resumen-box .monto { font-size: 2rem; font-weight: 700; }
        .resumen-box .num   { font-size: .85rem; opacity: .75; letter-spacing: 2px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar-banco d-flex align-items-center justify-content-between mb-4">
    <div>
        <div class="brand">🏦 Banco Lupita</div>
        <div class="info" id="nav-usuario">Cargando...</div>
    </div>
    <div class="d-flex gap-2">
        <a href="cuentas.html" class="btn-nav"><i class="bi bi-wallet2 me-1"></i>Mis cuentas</a>
        <a href="dashboard.html" class="btn-nav"><i class="bi bi-grid me-1"></i>Dashboard</a>
        <button class="btn-nav" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
    </div>
</nav>

<div class="container pb-5" style="max-width:560px">

    <div class="card">
        <div class="card-header py-3 px-4">
            <h5 class="mb-0 fw-bold" id="tituloHeader"><i class="bi bi-plus-circle me-2 text-primary"></i>Crear Nueva Cuenta</h5>
        </div>

        <div class="card-body p-4">

            <!-- ── FORMULARIO ── -->
            <div id="formularioSeccion">
                <form id="cuentaForm">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tipo de cuenta</label>
                        <select id="tipo" class="form-select" required>
                            <option value="">Selecciona...</option>
                            <option value="ahorro">Ahorro</option>
                            <option value="corriente">Corriente</option>
                        </select>
                    </div>

                    <!-- Descripción dinámica del tipo -->
                    <div id="tipoDescripcion" class="alert alert-info d-none py-2 px-3 small mb-3"></div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Saldo inicial</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" id="saldo" class="form-control" min="0" max="50000" step="0.01" placeholder="0.00" required>
                        </div>
                        <div class="form-text">Máximo $50,000.00 por apertura.</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-plus-circle me-1"></i>Crear Cuenta
                    </button>
                </form>

                <div id="mensaje" class="mt-3"></div>
            </div>

            <!-- ── RESUMEN TRAS CREAR ── -->
            <div id="resumenSeccion" class="d-none">

                <div class="resumen-box">
                    <div class="num mb-1">CUENTA Nº</div>
                    <div class="fw-bold fs-5 mb-1" id="res-numero">—</div>
                    <div class="text-white-50 small mb-1">Saldo inicial</div>
                    <div class="monto" id="res-saldo">$0.00</div>
                </div>

                <div class="row mb-3">
                    <div class="col-6">
                        <div class="text-muted small">Tipo de cuenta</div>
                        <div class="fw-semibold" id="res-tipo">—</div>
                    </div>
                    <div class="col-6">
                        <div class="text-muted small">Estado</div>
                        <div class="fw-semibold text-success"><i class="bi bi-check-circle me-1"></i>Activa</div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <a href="dashboard.html" class="btn btn-primary">
                        <i class="bi bi-arrow-left-right me-1"></i>Ir al Dashboard (Depositar / Retirar)
                    </a>
                    <a href="cuentas.html" class="btn btn-outline-primary">
                        <i class="bi bi-wallet2 me-1"></i>Ver todas mis cuentas
                    </a>
                    <button class="btn btn-outline-secondary" onclick="reiniciarFormulario()">
                        <i class="bi bi-plus me-1"></i>Crear otra cuenta
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Sesión ────────────────────────────────────────────────
const sesion = {
    usuarioId: localStorage.getItem('usuarioId'),
    nombre:    localStorage.getItem('nombre')
};
if (!sesion.usuarioId) window.location.href = 'frontend_login/login.html';
document.getElementById('nav-usuario').textContent = `Hola, ${sesion.nombre}`;

function cerrarSesion() { localStorage.clear(); window.location.href = 'frontend_login/login.html'; }

// ── Descripciones de tipo ─────────────────────────────────
const DESCRIPCIONES = {
    ahorro: {
        titulo: 'Cuenta de Ahorro',
        texto: 'Ideal para guardar dinero y tener rentabilidad moderada. Permite retiros ocasionales.',
        pros: 'Genera intereses · Bajo riesgo · Retiros libres',
        contras: 'No ideal para pagos diarios'
    },
    corriente: {
        titulo: 'Cuenta Corriente',
        texto: 'Pensada para operaciones diarias y pagos frecuentes.',
        pros: 'Pagos frecuentes · Tarjeta de débito · Sin límite de retiros',
        contras: 'No genera intereses o son muy bajos'
    }
};

const tipoSelect       = document.getElementById('tipo');
const tipoDescDiv      = document.getElementById('tipoDescripcion');

tipoSelect.addEventListener('change', () => {
    const info = DESCRIPCIONES[tipoSelect.value];
    if (!info) { tipoDescDiv.classList.add('d-none'); return; }
    tipoDescDiv.classList.remove('d-none');
    tipoDescDiv.innerHTML = `
        <strong>${info.titulo}</strong><br>
        ${info.texto}<br>
        <span class="text-success">✔ ${info.pros}</span><br>
        <span class="text-danger">✘ ${info.contras}</span>
    `;
});

// ── Envío del formulario ──────────────────────────────────
document.getElementById('cuentaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const mensajeDiv = document.getElementById('mensaje');
    mensajeDiv.innerHTML = '';

    const tipo  = tipoSelect.value;
    const saldo = parseFloat(document.getElementById('saldo').value);

    if (!tipo)             { mostrarMsg('Selecciona el tipo de cuenta.', 'warning'); return; }
    if (isNaN(saldo) || saldo < 0) { mostrarMsg('El saldo no puede ser negativo.', 'warning'); return; }
    if (saldo > 50000)     { mostrarMsg('El saldo inicial no puede superar $50,000.', 'warning'); return; }

    const btn = e.submitter;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Creando…';

    try {
        const res  = await fetch('account.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuarioId: sesion.usuarioId, tipo, saldo })
        });
        const data = await res.json();

        if (res.ok) {
            document.getElementById('formularioSeccion').classList.add('d-none');
            document.getElementById('resumenSeccion').classList.remove('d-none');
            document.getElementById('tituloHeader').innerHTML = '<i class="bi bi-check-circle me-2 text-success"></i>¡Cuenta Creada!';

            document.getElementById('res-numero').textContent = data.numero_cuenta;
            document.getElementById('res-saldo').textContent  = '$' + parseFloat(saldo).toLocaleString('es-MX', {minimumFractionDigits:2});
            document.getElementById('res-tipo').innerHTML     = `<span class="badge-tipo badge-${tipo}">${tipo.charAt(0).toUpperCase()+tipo.slice(1)}</span>`;
        } else {
            mostrarMsg(data.error, 'danger');
        }
    } catch {
        mostrarMsg('Error de conexión con el servidor.', 'danger');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-plus-circle me-1"></i>Crear Cuenta';
    }
});

function mostrarMsg(texto, tipo) {
    document.getElementById('mensaje').innerHTML = `<div class="alert alert-${tipo}">${texto}</div>`;
}

function reiniciarFormulario() {
    document.getElementById('cuentaForm').reset();
    tipoDescDiv.classList.add('d-none');
    document.getElementById('mensaje').innerHTML = '';
    document.getElementById('resumenSeccion').classList.add('d-none');
    document.getElementById('formularioSeccion').classList.remove('d-none');
    document.getElementById('tituloHeader').innerHTML = '<i class="bi bi-plus-circle me-2 text-primary"></i>Crear Nueva Cuenta';
}
</script>
</body>
</html>
